{% extends "base.html" %}

{% block lab %}Статьи{% endblock %}

{% block main %}
<div class="container">
    <h1 class="page-title">Список статей</h1>

    <a class="link" href="/lab8/create">Создать новую статью</a>

    <ul class="article-list">
        {% for article in articles %}
        <li class="article-item">
            <strong class="article-title">{{ article.title }}</strong>

            <div class="article-text">
                {{ article.article_text }}
            </div>

            <div class="article-actions">
                <a class="link" href="/lab8/articles/edit/{{ article.id }}">Редактировать</a>

                <form method="post"
                      action="/lab8/articles/delete/{{ article.id }}"
                      style="display:inline;">
                    <button class="btn" type="submit"
                            onclick="return confirm('Удалить статью?');">
                        Удалить
                    </button>
                </form>
            </div>
        </li>
        {% endfor %}
    </ul>

    <br>
    <a class="link" href="/lab8/">К базе знаний</a>
</div>
{% endblock %}
