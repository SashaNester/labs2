{% extends "base.html" %}

{% block lab %}Создание статьи{% endblock %}

{% block main %}
<div class="container">
    <h1 class="page-title">Создание статьи</h1>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form action="/lab8/create" method="post">

        <div class="form-group">
            <label>
                Название:
                <input class="input-field" type="text" name="title">
            </label>
        </div>

        <div class="form-group">
            <label>
                Текст статьи:<br>
                <textarea class="textarea-field" name="text" rows="5"></textarea>
            </label>
        </div>

        <button class="btn" type="submit">Создать</button>
    </form>

    <br>
    <a class="link" href="/lab8/articles/">Назад к статьям</a>
</div>
{% endblock %}
