{% extends "base.html" %}

{% block lab %}Редактировать статью{% endblock %}

{% block main %}
<div class="container">
    <h1 class="page-title">Редактирование статьи</h1>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="post">

        <div class="form-group">
            <label>
                Название:
                <input class="input-field"
                       type="text"
                       name="title"
                       value="{{ article.title }}">
            </label>
        </div>

        <div class="form-group">
            <label>
                Текст статьи:<br>
                <textarea class="textarea-field"
                          name="text"
                          rows="7">{{ article.article_text }}</textarea>
            </label>
        </div>

        <button class="btn" type="submit">Сохранить</button>
    </form>

    <br>
    <a class="link" href="/lab8/articles/">Назад</a>
</div>
{% endblock %}
