{% extends "rgzbase.html" %}
{% block title %}Вход{% endblock %}
{% block main %}
<h1>Вход</h1>

<div class="rgz-form-container">
    <form method="post">
        <label>Логин:
            <input type="text" name="login">
        </label>
        <label>Пароль:
            <input type="password" name="password">
        </label>
        <button type="submit">Войти</button>
    </form>
    <a href="{{ url_for('rgz.register') }}">Регистрация</a>
</div>
{% endblock %}
